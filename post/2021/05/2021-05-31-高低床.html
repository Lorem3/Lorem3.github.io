        async function decryptRaw(bf,key,outV){
            if(bf.length < 8){

            for (let i  = 0; i  < 4; i ++) {

            }

                outV.count = count
            }

            var aesDec= {name: "AES-CTR",counter:bfIv,length:64};
            try{
                let bfDec  = await substl.decrypt(aesDec,keyObj,bfCipher)
                return  new  Uint8Array(bfDec)
            }catch (error) {
                throw error
            }
             
        }
